<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Gerçek Dünyada 3D Model | WebXR Passthrough</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      #ar-instructions {
        position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
        background: rgba(0,0,0,0.6); color: white; padding: 10px;
        border-radius: 8px; font-family: sans-serif; pointer-events: none;
        z-index: 999; text-align: center;
      }
    </style>
  </head>
  <body>

    <div id="ar-instructions">
      Gözlükte "ENTER AR" butonuna basın.<br>
      Gerçek dünyayı görmüyorsanız gözlük ayarlarından Passthrough'u açın.
    </div>

    <a-scene 
      renderer="alpha: true; antialias: true; colorManagement: true;"
      webxr="requiredFeatures: local-floor, passthrough; optionalFeatures: hit-test;"
      background="transparent: true">
      
      <a-assets>
        <a-asset-item id="modelim" src="https://cdn.jsdelivr.net/gh/hasanyvz94-dev/dthamlet.github.io@main/model.glb?v=3"></a-asset-item>
      </a-assets>

      <a-light type="ambient" intensity="1.5"></a-light>
      <a-light type="directional" position="1 4 2" intensity="1"></a-light>

      <a-entity 
        id="model-container"
        gltf-model="#modelim" 
        position="0 1.2 -2" 
        scale="1 1 1"
        rotation="0 0 0">
      </a-entity>

      <a-entity camera look-controls wasd-controls position="0 1.6 0"></a-entity>

    </a-scene>

    <script>
      // Gözlük AR moduna girdiğinde arka planı tamamen şeffaf yapar
      const sceneEl = document.querySelector('a-scene');
      sceneEl.addEventListener('enter-vr', function () {
        if (sceneEl.is('ar-mode')) {
          console.log("AR/Passthrough Moduna Girildi");
          document.getElementById('ar-instructions').style.display = 'none';
        }
      });
    </script>
  </body>
</html>
