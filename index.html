<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Viewer | VR & AR</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f4; }
        
        /* Modelin Görüneceği Alan */
        model-viewer {
            width: 100%;
            height: 100vh;
            background-color: #ffffff; /* Modernist ve sade bir arka plan */
            --poster-color: transparent;
        }

        /* AR Butonu Özelleştirme */
        #ar-button {
            background-image: url(https://modelviewer.dev/assets/ic_view_in_ar_new_googblue_48dp.png);
            background-repeat: no-repeat;
            background-size: 20px 20px;
            background-position: 12px 50%;
            background-color: #fff;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            bottom: 132px;
            padding: 0px 16px 0px 40px;
            font-family: Roboto Regular, Helvetica Neue, sans-serif;
            font-size: 14px;
            color:#4285f4;
            height: 36px;
            line-height: 36px;
            border-radius: 18px;
            border: 1px solid #DADCE0;
        }

        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.8);
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        h1 { font-size: 18px; margin: 0; color: #333; }
        p { font-size: 12px; color: #666; }
    </style>
</head>
<body>

    <div class="controls">
        <h1>3D Galeri</h1>
        <p>Modeli çevirmek için sürükle, AR için butona tıkla.</p>
    </div>

    <model-viewer 
        src="https://cdn.jsdelivr.net/gh/hasanyvz94-dev/dthamlet.github.io@main/model.glb?v=3" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        touch-action="none" 
        shadow-intensity="1" 
        exposure="1"
        autoplay
        xr-environment>
        
        <button slot="ar-button" id="ar-button">
            Gerçek Dünyaya Yerleştir (AR)
        </button>

    </model-viewer>

</body>
</html>
