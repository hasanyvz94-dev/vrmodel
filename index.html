<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>VR Projem | Kesin Çalışan Kod</title>
    <meta name="description" content="VR Gözlük Uyumlu Model Görüntüleyici">
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
    
    <script>
      // Unity'deki VRMouseMoveController mantığını A-Frame'e uyarlayan bileşen
      AFRAME.registerComponent('mouse-move-logic', {
        schema: {
          speed: { type: 'number', default: 0.01 }
        },
        init: function () {
          this.cameraEl = document.querySelector('#camera');
          this.isLocked = false;

          // Mouse hareketini yakalamak için ekran kilitlenmesi (Pointer Lock) gerekir
          document.addEventListener('click', () => {
            document.body.requestPointerLock();
          });

          document.addEventListener('pointerlockchange', () => {
            this.isLocked = document.pointerLockElement === document.body;
          });

          this.onMouseMove = this.onMouseMove.bind(this);
          window.addEventListener('mousemove', this.onMouseMove);
        },
        onMouseMove: function (evt) {
          if (!this.isLocked) return;

          // Unity: Input.GetAxis("Mouse X") ve "Mouse Y"
          let mouseX = evt.movementX || 0;
          let mouseZ = -evt.movementY || 0; // Tarayıcıda Y ters işler, ileri gitmek için tersini alıyoruz

          // Kameranın dünya yönlerini al
          let cameraRotation = this.cameraEl.object3D.quaternion;
          
          // Unity: forward ve right vektörlerini hesapla
          let forward = new THREE.Vector3(0, 0, -1).applyQuaternion(cameraRotation);
          let right = new THREE.Vector3(1, 0, 0).applyQuaternion(cameraRotation);

          // Unity: forward.y = 0; right.y = 0; (Yatay düzlemde hareket)
          forward.y = 0;
          right.y = 0;
          forward.normalize();
          right.normalize();

          // Unity: move = (right * mouseX + forward * mouseZ) * speed;
          let moveX = right.multiplyScalar(mouseX * this.data.speed);
          let moveZ = forward.multiplyScalar(mouseZ * this.data.speed);
          
          // Rig'i hareket ettir
          this.el.object3D.position.add(moveX);
          this.el.object3D.position.add(moveZ);
        }
      });
    </script>

    <style>
        .ar-instructions {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.5); color: white; padding: 10px; border-radius: 5px;
            font-family: sans-serif; display: none; z-index: 10;
        }
    </style>
  </head>
  <body>

    <a-scene webxr="optionalFeatures: hit-test, local-floor; referenceSpaceType: local-floor">
      
      <a-assets>
        <a-asset-item id="kendiModelim" src="https://cdn.jsdelivr.net/gh/hasanyvz94-dev/dthamlet.github.io@main/model.glb?v=3"></a-asset-item>
      </a-assets>

      <a-light type="ambient" intensity="0.7"></a-light>
      <a-light type="directional" position="1 2 1" intensity="0.8"></a-light>

      <a-entity 
        id="modelEntity"
        gltf-model="#kendiModelim" 
        position="0 0 -3" 
        scale="1 1 1"
        shadow="cast: true; receive: true"
        animation-mixer> </a-entity>

      <a-entity id="rig" position="0 0 0" mouse-move-logic="speed: 0.02">
        <a-entity id="camera" camera look-controls wasd-controls position="0 1.6 0"></a-entity>
        
        <a-entity laser-controls="hand: left"></a-entity>
        <a-entity laser-controls="hand: right"></a-entity>
      </a-entity>

      <a-plane position="0 0 0" rotation="-90 0 0" width="100" height="100" color="#777" shadow="receive: true"></a-plane>

    </a-scene>

  </body>
</html>
