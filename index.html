<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Gerçek Dünyada VR Deneyimi</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <style>
      /* Sitenin arka planını şeffaf yapıyoruz ki kameralar görünebilsin */
      body { background-color: rgba(0, 0, 0, 0); margin: 0; overflow: hidden; }
    </style>
  </head>
  <body>

    <a-scene 
      webxr="requiredFeatures: passthrough, local-floor;" 
      renderer="alpha: true; colorManagement: true;"
      id="sahne">
      
      <a-assets>
        <a-asset-item id="modelim" src="https://cdn.jsdelivr.net/gh/hasanyvz94-dev/dthamlet.github.io@main/model.glb?v=3"></a-asset-item>
      </a-assets>

      <a-light type="ambient" intensity="1"></a-light>
      <a-light type="directional" position="1 2 1" intensity="1.5"></a-light>

      <a-entity 
        gltf-model="#modelim" 
        position="0 1.2 -2" 
        scale="1 1 1"
        id="ana-model">
      </a-entity>

      <a-entity camera look-controls wasd-controls position="0 1.6 0"></a-entity>

    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');

      // VR moduna girildiğinde arka planın şeffaf kalmasını sağlayan sistem
      sceneEl.addEventListener('enter-vr', function () {
        // VR modundayken passthrough'u zorla aktif et
        if (sceneEl.is('vr-mode')) {
          sceneEl.setAttribute('background', 'transparent', true);
        }
      });
    </script>
  </body>
</html>
